<div class="card no-print">
  <h2 class="section-title">Riwayat Transaksi</h2>

  <div class="cashbook-filter">
    <label>
      Tanggal:
      <input type="date" class="input-field" x-model="filter.tanggal" @change="load()">
    </label>
    <label>
      <button type="button" class="btn-secondary" @click="filter.tanggal=''; load()">Tampilkan Semua</button>
    </label>
    <div class="cashbook-total">
      Total: <strong x-text="formatRupiah(totalHari)"></strong>
      <small>(<span x-text="orders.length"></span> transaksi)</small>
    </div>
  </div>

  <table class="data-table">
    <thead>
      <tr>
        <th>#</th>
        <th>Tanggal</th>
        <th>Waktu</th>
        <th>Kasir</th>
        <th>Items</th>
        <th>Metode</th>
        <th>Total</th>
        <th>Aksi</th>
      </tr>
    </thead>
    <tbody>
      <template x-for="o in orders" :key="o.id">
        <tr>
          <td x-text="'#' + o.id"></td>
          <td x-text="o.tanggal"></td>
          <td x-text="(o.createdAt || '').slice(11,16) || '-'"></td>
          <td x-text="o.kasirNama || o.kasir"></td>
          <td x-text="itemCount(o) + ' pcs'"></td>
          <td x-text="o.metodeBayar || 'tunai'"></td>
          <td x-text="formatRupiah(o.total)"></td>
          <td>
            <button type="button" class="btn-secondary btn-sm" @click="openReceipt(o)">Lihat</button>
            <button type="button" class="btn-primary btn-sm" @click="printOrder(o)">Cetak</button>
          </td>
        </tr>
      </template>
      <template x-if="!orders.length">
        <tr><td colspan="8" class="text-muted">Tidak ada transaksi pada tanggal ini.</td></tr>
      </template>
    </tbody>
  </table>

  <div class="receipt-modal" x-show="selected" @click.self="closeReceipt()">
    <div class="receipt-modal-body">
      <h3>Detail Transaksi #<span x-text="selected?.id"></span></h3>
      <p class="text-muted" x-text="selected?.tanggal + ' • ' + (selected?.kasirNama || selected?.kasir)"></p>
      <ul class="receipt-item-list">
        <template x-for="row in (selected?.items || [])" :key="row.id">
          <li>
            <span x-text="row.nama + ' × ' + row.qty"></span>
            <strong x-text="formatRupiah(row.harga * row.qty)"></strong>
          </li>
        </template>
      </ul>
      <div class="cart-total">Total: <span x-text="formatRupiah(selected?.total)"></span></div>
      <div style="display:flex;gap:0.5rem;margin-top:1rem;">
        <button class="btn-primary" type="button" @click="printOrder(selected)">Cetak Struk</button>
        <button class="btn-secondary" type="button" @click="closeReceipt()">Tutup</button>
      </div>
    </div>
  </div>
</div>

<template x-if="selected">
  <div id="receipt-print" class="receipt-thermal">
    <div class="receipt-header">
      <strong x-text="settings.businessName"></strong>
      <div>🍗 Ayam Goreng & Minuman</div>
    </div>
    <div class="receipt-meta">
      <div x-text="settings.address"></div>
      <div>Telp: <span x-text="settings.phone"></span></div>
      <hr>
      <div>No: #<span x-text="selected.id"></span></div>
      <div><span x-text="selected.tanggal"></span></div>
      <div>Kasir: <span x-text="selected.kasirNama || selected.kasir"></span></div>
    </div>
    <hr>
    <table class="receipt-items">
      <template x-for="row in selected.items" :key="row.nama">
        <tr>
          <td colspan="2" x-text="row.nama"></td>
        </tr>
        <tr>
          <td x-text="row.qty + ' x ' + formatRupiah(row.harga)"></td>
          <td class="receipt-right" x-text="formatRupiah(row.qty * row.harga)"></td>
        </tr>
      </template>
    </table>
    <hr>
    <div class="receipt-total">
      <span>TOTAL</span>
      <span x-text="formatRupiah(selected.total)"></span>
    </div>
    <div class="receipt-footer">
      <p x-text="settings.receiptFooter"></p>
      <p>*** <span x-text="settings.businessName"></span> ***</p>
    </div>
  </div>
</template>
